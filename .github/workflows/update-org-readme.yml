name: Update Org README

on:
  schedule:
    - cron: '7 * * * *'  # hourly at :07
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate README
        env:
          GH_TOKEN: ${{ secrets.ORG_README_PAT }}
        run: |
          set -euo pipefail

          ORG="psagents"

          # Fetch all org repos, exclude .github itself, sort by pushed_at desc
          REPOS=$(gh api "orgs/${ORG}/repos?per_page=100&sort=pushed&direction=desc" \
            --paginate \
            --jq '[.[] | select(.name != ".github") | {
              name: .name,
              url: .html_url,
              pushed_at: .pushed_at
            }] | sort_by(.pushed_at) | reverse')

          # Build markdown table
          {
            echo "# ${ORG}"
            echo ""
            echo "| Repository | Description | Last updated |"
            echo "|------------|-------------|:------------:|"
            while IFS= read -r repo; do
              name=$(echo "$repo" | jq -r '.name')
              url=$(echo "$repo"  | jq -r '.url')
              date=$(echo "$repo" | jq -r '.pushed_at | split("T")[0]')

              # Try to fetch description from SKILL.md frontmatter
              skill_md=$(gh api "repos/${ORG}/${name}/contents/SKILL.md" \
                -H "Accept: application/vnd.github.v3.raw" 2>/dev/null || true)
              description=""
              if [[ -n "$skill_md" ]]; then
                description=$(echo "$skill_md" \
                  | sed -n 's/^description:[[:space:]]*"\(.*\)"[[:space:]]*$/\1/p' \
                  | head -1)
              fi

              echo "| [${name}](${url}) | ${description} | ${date} |"
            done < <(echo "$REPOS" | jq -c '.[]')
            echo ""
            echo "_Updated automatically every hour by [update-org-readme.yml](https://github.com/psagents/.github/blob/main/.github/workflows/update-org-readme.yml)._"
          } > README.md
          mkdir -p profile
          cp README.md profile/README.md

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md profile/README.md && echo "No changes, skipping commit." && exit 0
          git add README.md profile/README.md
          git commit -m "chore: update org README [skip ci]"
          git push
